<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · Silo Silla{% else %}Silo Silla{% endif %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px; line-height: 1.75;
      color: #1c1c1c; background: #f8f6f0;
      margin: 0; padding: 0;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 64px 28px 96px; }
    a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { opacity: 0.6; }
    p { margin: 0 0 1.5em; }
    hr { border: none; border-top: 1px solid #dedad4; margin: 48px 0; }
    .nav {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
      color: #999; text-decoration: none; display: block; margin-bottom: 72px;
    }
    .nav:hover { color: #1c1c1c; opacity: 1; }
    .site-header { margin-bottom: 64px; border-bottom: 1px solid #dedad4; padding-bottom: 40px; }
    .site-name {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px; font-weight: 400; letter-spacing: 0.25em;
      text-transform: uppercase; margin: 0 0 10px;
    }
    .site-desc { font-style: italic; color: #999; font-size: 16px; margin: 0; }
    .post-list { list-style: none; padding: 0; margin: 0 0 64px; }
    .post-item { padding: 20px 0; border-bottom: 1px solid #ede9e3; }
    .post-item:first-child { border-top: 1px solid #ede9e3; }
    .post-meta-small {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px; color: #aaa; margin-bottom: 6px; letter-spacing: 0.03em;
    }
    .post-item a { font-size: 19px; text-decoration: none; display: block; line-height: 1.35; }
    .post-item a:hover { text-decoration: underline; text-underline-offset: 3px; }
    .post-header { margin-bottom: 48px; }
    .post-date-line {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px; color: #aaa; letter-spacing: 0.05em; margin-bottom: 16px;
    }
    h1 { font-size: 26px; font-weight: normal; line-height: 1.3; margin: 0; }
    .site-footer {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 12px; color: #bbb; margin-top: 72px; letter-spacing: 0.03em;
    }
    @media (max-width: 480px) {
      body { font-size: 17px; }
      .container { padding: 40px 20px 72px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">{{ content }}</div>
</body>
</html>
