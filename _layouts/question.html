<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Silo Silla</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #c8c3b8;
      font-family: Georgia, serif;
      line-height: 1.75;
      padding: 60px 20px 120px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    .back {
      font-family: monospace;
      font-size: 0.8rem;
      color: #555;
      text-decoration: none;
      display: block;
      margin-bottom: 60px;
    }
    .back:hover { color: #888; }
    .meta {
      font-family: monospace;
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }
    .tipo {
      font-family: monospace;
      font-size: 0.7rem;
      color: #6a8f6a;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
    }
    .domanda {
      font-size: 1.45rem;
      line-height: 1.5;
      color: #e8e3d8;
      font-style: italic;
      margin-bottom: 48px;
      padding-left: 24px;
      border-left: 2px solid #3a5a3a;
    }
    .contesto {
      font-size: 0.95rem;
      color: #9a9590;
      border-top: 1px solid #222;
      padding-top: 32px;
    }
    .inbox-note {
      margin-top: 56px;
      padding: 20px 24px;
      border: 1px solid #222;
      font-family: monospace;
      font-size: 0.78rem;
      color: #555;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="{{ '/' | relative_url }}">← silo silla</a>

    <div class="meta">
      {{ page.date | date: "%-d %B %Y" }} · {{ page.ciclo }}
    </div>

    <div class="tipo">una domanda</div>

    <div class="domanda">{{ page.title }}</div>

    {% if page.content and page.content != "" %}
    <div class="contesto">
      {{ content }}
    </div>
    {% endif %}

    <div class="inbox-note">
      questa domanda rimane aperta.<br>
      se vuoi rispondere, scrivimi.
    </div>
  </div>
</body>
</html>
